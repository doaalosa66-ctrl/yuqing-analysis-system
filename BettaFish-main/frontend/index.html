<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI舆情巡航</title>

    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/space-theme.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        /* 仪表盘与历史记录弹窗的通用样式 */
        #dashboardView, #historyView {
            position: fixed; inset: 0;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.85); z-index: 100;
        }
        .dashboard-container {
            background: #1a1a2e; border: 1px solid #444; border-radius: 12px;
            padding: 36px 40px; min-width: 380px; color: #e0e0e0;
        }
        .dashboard-title { margin: 0 0 24px; font-size: 1.3rem; color: #7eb8f7; }
        .dashboard-form { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
        .dashboard-form label { font-size: 0.8rem; color: #aaa; margin-top: 8px; }
        .dashboard-form input {
            background: #0d0d1a; border: 1px solid #555; border-radius: 6px;
            color: #e0e0e0; padding: 8px 12px; font-size: 0.95rem;
        }
        .dashboard-status {
            font-size: 0.85rem; color: #7eb8f7; margin-bottom: 20px;
            min-height: 20px; word-break: break-all;
        }
        .dashboard-actions { display: flex; gap: 12px; }
        .dashboard-actions button, .dashboard-back-btn, .dashboard-entry-btn {
            background: #2a2a4a; border: 1px solid #555; border-radius: 6px;
            color: #e0e0e0; padding: 8px 18px; cursor: pointer; font-size: 0.9rem;
        }
        .dashboard-actions button:hover, .dashboard-back-btn:hover, .dashboard-entry-btn:hover {
            background: #3a3a6a;
        }
        .dashboard-entry-btn { margin-top: 12px; font-size: 0.8rem; opacity: 0.7; }
    </style>
</head>
<body>

    <div id="dashboardView" style="display: none;">
        <div class="dashboard-container">
            <h2 class="dashboard-title">⚙️ 系统配置仪表盘</h2>
            <div class="dashboard-form">
                <label>API Key</label>
                <input type="password" id="deepseekApiKey" placeholder="sk-..." />
                <label>Base URL</label>
                <input type="text" id="deepseekBaseUrl" placeholder="https://api.deepseek.com" />
                <label>模型名称</label>
                <input type="text" id="deepseekModel" placeholder="deepseek-chat" />
            </div>
            <div class="dashboard-status" id="systemStatusArea">正在检测系统状态...</div>
            <div class="dashboard-actions">
                <button onclick="saveDashboardConfig()">保存配置</button>
                <button onclick="launchSystem()">一键启动</button>
                <button class="dashboard-back-btn" onclick="window.AppViewController.switchView('HOME')">返回首页</button>
            </div>
        </div>
    </div>

    <div id="spotlightShell" class="active">
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="输入搜索关键词...">
            <button id="searchButton" onclick="performSearch()">搜索</button>
        </div>
        <div style="margin-top: 15px; display: flex; gap: 15px; justify-content: center;">
            <button class="dashboard-entry-btn" onclick="window.AppViewController.switchView('DASHBOARD'); refreshSystemStatus();">⚙️ 系统配置</button>
            <button class="dashboard-entry-btn" onclick="openHistoryPanel()">📜 历史记录</button>
        </div>
    </div>

    <div id="forumState" style="display: none; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #0b0c10;">
        <div style="width: 60%; background: #1f2833; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center;">
            <h2 style="color: #66fcf1; margin-bottom: 25px; letter-spacing: 2px;">OmniSight 深度分析中</h2>

            <div style="width: 100%; height: 20px; background: #0b0c10; border-radius: 10px; overflow: hidden; border: 1px solid #45a29e;">
                <div id="aiProgressBar" style="width: 0%; height: 100%; background: linear-gradient(90deg, #45a29e, #66fcf1); transition: width 0.5s ease;"></div>
            </div>

            <p id="aiProgressText" style="color: #c5c6c7; margin-top: 20px; font-size: 1.1rem;">正在初始化任务指令...</p>
        </div>
    </div>

    <div id="mainContent" style="display: none;"></div>

    <div id="reportPreview" style="display: none;">
        <div style="position: fixed; top: 20px; right: 20px; z-index: 1000; display: flex; gap: 10px;">
            <button onclick="downloadReport()" style="padding: 8px 18px; background: #45a29e; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-weight: bold;">📥 下载报告</button>
            <button id="immersiveBackBtn" onclick="window.AppViewController.switchView('HOME')" style="padding: 8px 18px; background: #2a2a4a; color: #e0e0e0; border: 1px solid #555; border-radius: 6px; cursor: pointer;">返回首页</button>
        </div>

        <div id="reportContainer" style="padding-top: 80px;"></div>
    </div>

    <div id="historyView" style="display: none;">
        <div class="dashboard-container" style="max-height: 80vh; overflow-y: auto; width: 600px;">
            <h2 class="dashboard-title">📜 历史分析报告</h2>

            <div id="historyList" style="display: flex; flex-direction: column; gap: 12px;"></div>

            <button class="dashboard-back-btn" onclick="document.getElementById('historyView').style.display='none'" style="margin-top: 20px; width: 100%;">关闭</button>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/viewController.js"></script>
    <script src="js/app_v2.js"></script>

</body>
</html>
